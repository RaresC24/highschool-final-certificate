<!DOCTYPE html>
<html lang="en">
    <head>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="profil.css">
        <title>Profil</title>

    <body>
        <div class="container">

            <h1>Conectare Cont RCF</h1>
            <form>

                <div class="form-control">
                    <input type="email" required>
                    <label>Email</label>
                </div>

                <div class="form-control">
                    <input type="password" required>
                    <label>Parola</label>
                </div>

                <button class="btn">Conectare</button>
                <p class="text">Nu aveti cont? <a href="#">Inregistrati-va</a></p>

            </form>

        </div>
        <script src="profil.js"></script>
    </body>
</html>
